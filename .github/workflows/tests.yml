name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install pytest
      - run: python -m json.tool .codex-plugin/plugin.json > /dev/null
      - run: python scripts/build_plugin_assets.py
      - run: git diff --exit-code -- assets
      - run: python -m pytest tests -q
